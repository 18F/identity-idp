        '400':
          description: |
            The 400 (Bad Request) status code indicates that the server cannot or
            will not process the request due to something that is perceived to be
            a client error (e.g., malformed request syntax, invalid request
            message framing, or deceptive request routing).
        '401':
          description: |
            The 401 (Unauthorized) status code indicates that the request has not
            been applied because it lacks valid authentication credentials for
            the target resource. Please ensure that the request includes a valid Bearer token.
        '403':
          description: |
            The 403 (Forbidden) status code indicates that the server understood
            the request but refuses to authorize it. Please reach out to your account manager
            if you think this is a mistake.
        5XX:
          description: Unexpected error.
  /api/attempts/status:
    get:
      summary: Request to get the status of an Event Stream
      description: |-
        [Spec](https://openid.net/specs/openid-sharedsignals-framework-1_0-ID3.html#name-reading-a-streams-status)

        An Event Receiver checks the current status of an event stream by making an
        HTTP GET request to the stream’s Status Endpoint.
      operationId: get_status
      security:
        - BearerAuth: []
      responses:
        '200':
          description: |-
            On receiving a valid request the Event Transmitter responds with a 200
            OK response containing a JSON object with an attribute status
          content:
            application/json:
              schema:
                type: object
                properties: &ref_50
                  status:
                    type: string
                    example: disabled
                    enum:
                      - disabled
                      - enabled
                      - paused
                    description: |-
                      REQUIRED. The status of the stream. Values can be one of:

                      `enabled`:
                       The Transmitter MUST transmit events over the stream,
                       according to the stream’s configured delivery method.

                      `paused`:
                       The Transmitter MUST NOT transmit events over the stream.
                       The transmitter will hold any events it would have transmitted while paused,
                       and SHOULD transmit them when the stream’s status becomes enabled.
                       If a Transmitter holds successive events that affect the same Subject Principal,
                       then the Transmitter MUST make sure that those events are transmitted in
                       the order of time that they were generated OR the Transmitter MUST send
                       only the last events that do not require the previous events affecting
                       the same Subject Principal to be processed by the Receiver,
                       because the previous events are either cancelled by the later events or
                       the previous events are outdated.

                      `disabled`:
                       The Transmitter MUST NOT transmit events over the stream,
                       and will not hold any events for later transmission.
        '400':
          description: |
            The 400 (Bad Request) status code indicates that the server cannot or
            will not process the request due to something that is perceived to be
            a client error (e.g., malformed request syntax, invalid request
            message framing, or deceptive request routing).
        '401':
          description: |
            The 401 (Unauthorized) status code indicates that the request has not
            been applied because it lacks valid authentication credentials for
            the target resource. Please ensure that the request includes a valid Bearer token.
        '403':
          description: |
            The 403 (Forbidden) status code indicates that the server understood
            the request but refuses to authorize it. Please reach out to your account manager
            if you think this is a mistake.
        5XX:
          description: Unexpected error.
components:
  schemas:
    DecodedJWTPayload:
      type: object
      title: Decoded JWT Payload
      description: |
        Default payload body for each event.
      properties: *ref_1
    Events:
      type: object
      allOf: *ref_2
    TransmitterConfiguration:
      type: object
      title: Transmitter Configuration Response
      description: |
        Metadata describing the Login.gov transmitter configuration.
      properties: *ref_3
    PollParameters:
      type: object
      title: Polling Request
      description: |
        Acceptable body to poll the Attempts API
      properties: *ref_4
    Subject:
      type: object
      properties: *ref_5
    EventProperties:
      type: object
      properties: *ref_0
    MfaEnrollPhoneOtpSent:
      description: |
        Relevant only when the user is enrolling a phone as their MFA. The user has been sent a one-time password by Login.gov over SMS or voice during the MFA enrollment process.
      allOf: *ref_6
    MfaEnrollCodeRateLimited:
      description: |
        The user has exceeded the rate limit for entering an MFA code when setting up an MFA device. Note that this event is currently only generated for phone mfa types.
      allOf: *ref_7
    MfaEnrollPhoneOtpSentRateLimited:
      description: |
        The user has exceeded the rate limit for requesting OTPs be sent to their phone when setting up an MFA device.
      allOf: *ref_8
    MfaEnrolled:
      description: The user has set up multi-factor authentication
      allOf: *ref_9
    UserRegistrationEmailConfirmed:
      description: |
        User clicks on the confirmation link sent to their provided email address. Note: Internally, Login's meaning of a 'confirmed' email is overloaded, and also requires that a password has been set. This event uses the plain-language meaning of 'confirmed': a user clicked the link in an email, showing ownership of the email account.
      allOf: *ref_10
    UserRegistrationEmailSubmissionRateLimited:
      description: |
        This event can occur during sign up when a user attempts to submit the same email address multiple times without setting up a password. Note that Login.gov does not actually prevent the user from retrying in this case.
      allOf: *ref_11
    UserRegistrationEmailSubmitted:
      description: A user provides their email address to create a new account.
      allOf: *ref_12
    UserRegistrationPasswordSubmitted:
      description: A user provides a password for their account.
      allOf: *ref_13
    RegistrationEvents:
      properties: *ref_14
    LoggedInAccountPurged:
      description: A logged in user deletes their account.
      allOf: *ref_15
    LoggedInPasswordChange:
      description: A logged in user changes the password for their account.
      allOf: *ref_16
    LoginCompleted:
      description: The user has logged in successfully and is being passed back to the service provider.
      allOf: *ref_17
    LoginEmailAndPasswordAuth:
      description: |
        During a login attempt, a user has submitted a password. Rather than tracking the number of failed password auth attempts, we generate this event on each attempt.
      allOf: *ref_18
    LoginRateLimited:
      description: |
        The user has exceeded the limit for providing their email address and password all resulting in a failed login attempt.
      allOf: *ref_19
    LogoutInitiated:
      description: The user has logged out of their account.
      allOf: *ref_20
    MfaLoginPhoneOtpSent:
      description: |
        During a login attempt, an OTP code has been sent via SMS or Voice.
        Reauthentication occurs when the user was already signed in but their session has timed out and they need to reauthenticate to continue.
      allOf: *ref_21
    MfaLoginPhoneOtpSentRateLimited:
      description: |
        During a login attempt, the user has exceeded the limit for requesting an OTP be sent to their phone.
      allOf: *ref_22
    MfaLoginAuthSubmitted:
      description: |
        During a login attempt, the user has submitted a verification attempt using their MFA . 
        Reauthentication occurs when the user was already signed in but their session has timed out and they need to reauthenticate to continue.
      allOf: *ref_23
    MfaSubmissionCodeRateLimited:
      description: |
        The user has exceeded the limit for submitting an MFA code when signing in with a registered MFA device.
      allOf: *ref_24
    SessionTimeout:
      description: A logged in user has been inactive long enough to cause a session timeout
      allOf: *ref_25
    SignInEvents:
      properties: *ref_26
    AccountResetAccountDeleted:
      description: |
        A user requesting an account reset has completed the process. As a result, the account was deleted successfully.
      allOf: *ref_27
    ForgotPasswordEmailConfirmed:
      description: |
        A password reset having been previously requested, a user has clicked the link in the email to reset their password, confirming the email address’s validity.
      allOf: *ref_28
    ForgotPasswordEmailSent:
      description: |
        A user has requested a password reset.
      allOf: *ref_29
    ForgotPasswordNewPasswordSubmitted:
      description: |
        After previously requesting a password reset and having already clicked through from the email, a user has now submitted a new password.
      allOf: *ref_30
    AccountRecoveryEvents:
      properties: *ref_31
    IdvAddressSubmitted:
      description: |
        User manually submitted an IdV address
      allOf: *ref_32
    IdvDocumentUploaded:
      description: |
        The user has uploaded documents locally
      allOf: *ref_33
    IdvDocumentUploadSubmitted:
      description: |
        The document was uploaded during identity proofing and authenticated by the vendor.
      allOf: *ref_34
    IdvEnrollmentComplete:
      description: |
        When the user is identity verified
      allOf: *ref_35
    IdvIppReadyToVerifyVisit:
      description: |
        When the user becomes able to visit the post office for in-person proofing.
      allOf: *ref_36
    IdvImageRetrievalFailed:
      description: |
        There was a network error while attempting to retrieve the images for document escrow.
        Therefore, document upload failed.
        These image file names and encryption keys are invalid, and are not saved in the document escrow.
      allOf: *ref_37
    IdvPhoneOtpSent:
      description: |
        When a security code is sent to the phone number provided by the user to verify the phone number belongs to them. The user can choose to receive the code via text message/SMS or phone call.
      allOf: *ref_38
    IdvPhoneOtpSubmitted:
      description: |
        When the user submits the security code that they received on their phone to verify their phone or address during identity proofing.
      allOf: *ref_39
    IdvPhoneSubmitted:
      description: |
        When the user provides their phone number for identity verification.
      allOf: *ref_40
    IdvPhoneVerified:
      description: |
        The user's IdV phone number is assessed
      allOf: *ref_41
    IdvRateLimited:
      description: |
        The user reaches verification submission rate limits when identity proofing.
      allOf: *ref_42
    IdvReproof:
      description: |
        This event is triggered when a user who has previously completed proofing completes identity proofing again. Note that the reproofing flow is identical to the regular proofing flow and will generate the same events as initial proofing. This is an additional event signifying that the just-completed proofing process was not the first time the user has proofed.
      allOf: *ref_43
    IdvSsnSubmitted:
      description: |
        When the user submits their Social Security Number during identity proofing.
      allOf: *ref_44
    IdvDeviceRiskAssessment:
      description: |
        This event captures the result of the Device Risk Assessment during Identity Verification.
      allOf: *ref_45
    IdvVerificationSubmitted:
      description: |
        When the user verifies their information when identity proofing.
      allOf: *ref_46
    IdvVerifyByMailLetterRequested:
      description: |
        The user has requested that a letter be sent via mail in order to verify their address.
      allOf: *ref_47
    IdvVerifyByMailEnterCodeSubmitted:
      description: |
        A user that requested to verify their address by mail has entered the security code contained in their letter.
      allOf: *ref_48
    IdentityProofingEvents:
      properties: *ref_49
    AllEvents:
      type: object
      allOf: *ref_2
    StreamStatus:
      type: object
      properties: *ref_50
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: rp-issuer JWT
      description: <rp-issuer> <token>
