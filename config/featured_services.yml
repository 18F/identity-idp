# Curated catalog of government services surfaced in the "More ways to use your
# account" discovery section of the account homepage (Accounts::HomeController).
#
# `name` values are proper nouns (agency/product names) and are intentionally
# plain strings, NOT i18n keys — they must never enter config/locales/*.yml.
# `description_key` and category `label_key` values ARE i18n keys and must exist
# in all four locales with real translations.
#
# `logo` is an optional path under app/assets/images. When omitted, the row
# falls back to the initials circle used by accounts/_connected_app.
#
# Source: Figma Login.gov homepage (node 11876-24688) and empty homepage
# (node 11893-26303). Agency logos exported from component set 11929:11209.
categories:
  - slug: taxes_and_money
    label_key: account.dashboard.discovery.categories.taxes_and_money
  - slug: health_and_benefits
    label_key: account.dashboard.discovery.categories.health_and_benefits
  - slug: jobs_and_retirement
    label_key: account.dashboard.discovery.categories.jobs_and_retirement
  - slug: travel
    label_key: account.dashboard.discovery.categories.travel
  - slug: veterans_and_military
    label_key: account.dashboard.discovery.categories.veterans_and_military
  - slug: business_and_professional
    label_key: account.dashboard.discovery.categories.business_and_professional

