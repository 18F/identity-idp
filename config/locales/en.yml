user_mailer.personal_key_regenerated.help_html: <p>Your %{app_name} account was just issued a new 16-character personal key. If this was you, no action is needed.</p><p>If you did not just reset your personal key, or if you’re not sure, please immediately take these steps to secure your account:<ol><li><a href="%{reset_password_url}">Change your password</a>. Choose a password that you haven’t already used with this account.</li><li><a href="%{account_url}">Log in to your account</a> and make sure you recognize all of the information, including the methods you use for two-factor authentication, such as phone number, authentication app, or security key.</li><li>Request a new personal key. Remember, never share it unless you are using it to log in to a trusted website that uses %{app_name}.</li></ol></p>
