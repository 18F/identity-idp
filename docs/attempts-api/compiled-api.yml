openapi: 3.0.3
info:
  version: 1.0.0
  title: Attempts Stream API for Login.gov
  license:
    name: CC0 1.0 Universal
    url: https://creativecommons.org/publicdomain/zero/1.0/legalcode
  description: |
    This document contains specifications for the Login.gov Attempts API, a new standards-based polling API based on the Shared Signals Framework (SSF) and the RISC poll-based SET delivery specification (RFC 8936).

    The Attempts API securely transmits integration-specific identity verification event summary data to Relying Parties (RP) for the purposes of fraud prevention and mitigation.

    To ensure the security of data transmission, all endpoints will utilize Bearer Tokens. The format of these Bearer Tokens will be <RP-ISSUER> <SHARED-SECRET>. To ensure the security of individual Security Event Tokens (SETs), each one will be encrypted with a public key provided from the RP.
servers:
  - url: https://secure.login.gov
    description: Production server (uses live data)
  - url: https://idp.int.identitysandbox.gov
    description: Sandbox server (uses test data)
paths:
  /.well-known/ssf-configuration:
    get:
      summary: Request for transmitter configuration
      description: Return Transmitter Configuration information.
      operationId: _well_known_configuration_get
      security: []
      responses:
        '200':
          description: |
            A set of Claims about the Transmitter's configuration,
            including all necessary endpoints and public key location information
          content:
            application/json:
              schema:
                type: object
                title: Transmitter Configuration Response
                description: |
                  Metadata describing the Login.gov transmitter configuration.
                properties: &ref_3
                  issuer:
                    type: string
                    description: |
                      Event issuer, which will be a Login.gov URL indicating the environment in which the event occurred.

                      This MUST be identical to the iss claim value in Security Event Tokens issued from this Transmitter.
                    format: uri
                    example: https://secure.login.gov
                  jwks_uri:
                    type: string
                    description: |
                      URL of the Transmitter's JSON Web Key Set
                    format: uri
                    example: https://secure.login.gov/api/openid_connect/certs
                  delivery:
                    type: object
                    description: Details about the delivery method and endpoint
                    properties:
                      endpoint_url:
                        type: string
                        format: uri
                        description: |
                          The URL of the polling endpoint

                          prod: `https://secure.login.gov/api/attempts/poll`

                          sandbox: `https://idp.int.identitysandbox.gov/attempts/poll`
                        example: https://secure.login.gov/api/attempts/poll
                      method:
                        type: string
                        format: uri
                        enum:
                          - https://schemas.openid.net/secevent/risc/delivery-method/poll
                  delivery_methods_supported:
                    type: array
                    items:
                      type: string
                      format: uri
                      enum:
                        - https://schemas.openid.net/secevent/risc/delivery-method/poll
                    description: List of supported delivery method URIs.
                  status_endpoint:
                    type: string
                    format: uri
                    description: |
                      The URL of the Status Endpoint.

                      prod: `https://secure.login.gov/api/attempts/status`

                      sandbox: `https://idp.int.identitysandbox.gov/attempts/status`
                    example: https://secure.login.gov/api/attempts/status
                  verification_endpoint:
                    type: string
                    format: uri
                    description: |
                      The URL of the Verification Endpoint.

                      prod: `https://secure.login.gov/api/attempts/verification`

                      sandbox: `https://idp.int.identitysandbox.gov/attempts/verification`
                    example: https://secure.login.gov/api/attempts/verification
        '400':
          description: |
            The 400 (Bad Request) status code indicates that the server cannot or
            will not process the request due to something that is perceived to be
            a client error (e.g., malformed request syntax, invalid request
            message framing, or deceptive request routing).
        5XX:
          description: Unexpected error.
  /api/attempts/poll:
    post:
      summary: Request for queued events to be returned.
      description: |-
        A Relying Party will POST this endpoint in order to receive Poll-Based Security Event Tokens (SET). These Sets will be the queued identity verification events.

        The structure of this endpoint is based on the [RISC Specification](https://www.rfc-editor.org/rfc/rfc8936.html#name-polling-http-request) for polling
      operationId: poll_events
      security:
        - BearerAuth: []
      requestBody:
        description: |
          The request is detailed in the RISC spec (https://www.rfc-editor.org/rfc/rfc8936.html#name-polling-http-request):

          When initiating a poll request, the SET Recipient constructs a JSON document that consists of
          polling request parameters and SET acknowledgement parameters in the form of JSON objects.
        required: false
        content:
          application/json:
            schema:
              type: object
              title: Polling Request
              description: |
                Acceptable body to poll the Attempts API
              properties: &ref_4
                ack:
                  type: array
                  items:
                    type: string
                  description: |
                    List of event JTIs that the receiver is acknowledging. The Transmitter can stop keeping track of these.
      responses:
        '200':
          description: |
            As detailed in the [RISC Spec](https://www.rfc-editor.org/rfc/rfc8936.html#name-polling-http-response):
            In response to a poll request, the SET Transmitter checks for available SETs and responds with a JSON document containing the list of SETs.

            A decoded SET looks like:

            ```
            "6454bc0b-00fc-4404-885c-7f07bef243ce": {
             "aud": "https://serviceprovider.com",
             "iat": 1657920726,
             "iss": "https://secure.login.gov",
             "jti": "6454bc0b-00fc-4404-885c-7f07bef243ce",
             "events": {
             "https://schemas.login.gov/secevent/attempts-api/event-type/mfa-enroll-backup-code": {
             "application_url": "string",
             "occurred_at": 1657920726,
             "subject": {
             "subject_type": "session",
             "session_id": "12345"
             },
             "user_ip_address": "string",
             "user_uuid": "string",
             "unique_session_id": "string",
             "success": true
             }
            }
            ```
          content:
            application/json:
              schema:
                type: object
                properties:
                  sets:
                    type: object
                    description: The key is the event JTI; the value is an encoded JWT
                    additionalProperties:
                      type: object
                      title: Decoded JWT Payload
                      description: |
                        Default payload body for each event.
                      properties: &ref_1
                        aud:
                          type: string
                          description: Event audience, ie the issuer of the RP's integration.
                          example: https://serviceprovider.com
                        iat:
                          type: integer
                          format: int64
                          description: |
                            Issued at timestamp for when the SET was created. `occurred_at` within the event may be a more reliable indicator of when the user action occurred, though in practical terms the two will typically be identical.
                          example: 1657920726
                        iss:
                          type: string
                          description: Event issuer, which will be a Login.gov URL indicating the environment in which the event occurred.
                          example: https://secure.login.gov
                        jti:
                          type: string
                          description: |
                            Transaction ID, a unique identifier for the SET. This functions as the CSP transaction ID.
                          example: 6454bc0b-00fc-4404-885c-7f07bef243ce
                        events:
                          type: object
                          allOf: &ref_2
                            - properties: &ref_14
                                mfa-enroll-phone-otp-sent:
                                  description: |
                                    Relevant only when the user is enrolling a phone as their MFA. The user has been sent a one-time password by Login.gov over SMS or voice during the MFA enrollment process.
                                  allOf: &ref_6
                                    - type: object
                                      properties: &ref_0
                                        application_url:
                                          type: string
                                          description: |
                                            Indicates the SP URL (redirect_uri) where the user will be redirected after authentication.
                                        aws_region:
                                          type: string
                                          description: AWS Region in which the event occurred.
                                        client_port:
                                          type: string
                                          description: Known more commonly as ephemeral port numbers associated with the Client IP – This is NOT the CSP server port 443 or 80.
                                        device_id:
                                          type: string
                                          description: |
                                            Cookie device unique identifier. This value is securely randomly generated server-side as a string of 128 hexadecimal characters using the SecureRandom Ruby library.
                                        google_analytics_cookies:
                                          type: object
                                          description: |
                                            Any Google Analytics cookie values that are present
                                        language:
                                          type: string
                                          description: The locale set by the user.
                                        occurred_at:
                                          type: number
                                          format: float64
                                          description: The time when the event occurred in epoch seconds.
                                        subject:
                                          type: object
                                          properties: &ref_5
                                            subject_type:
                                              type: string
                                              enum:
                                                - session
                                            session_id:
                                              type: string
                                              description: Matches the session ID passed in from the service provider
                                              example: '12345'
                                        useragent_string:
                                          type: string
                                          description: The end user's browser's useragent string, which identifies the type of browser, device and operating system being used as well as the version of the browser.
                                        user_ip_address:
                                          type: string
                                          description: The end user’s IP address.
                                        user_uuid:
                                          type: string
                                          description: |
                                            The primary key identifying a user in Login.gov. This field is populated only for users who have used their accounts to access the Agency Application, since it is generated when a user provides their consent for the first time.
                                        unique_session_id:
                                          type: string
                                          description: |
                                            A string identifying the Login.gov session ID for the user. This is generated by Login.gov and is distinct from the SP-provided session_id within the subject attribute.
                                    - type: object
                                      properties:
                                        phone_number:
                                          type: string
                                          description: The provided phone number
                                        otp_delivery_method:
                                          type: string
                                          enum:
                                            - sms
                                            - voice
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the one-time password was sent.
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false
                                          properties:
                                            telephony:
                                              type: array
                                              description: |
                                                The user registered a phone for MFA, but then opted out by replying “STOP” over text, so when attempting to send a subsequent OTP it fails with this failure reason.
                                              items:
                                                type: string
                                                enum:
                                                  - 'Telephony::OptOutError - Pinpoint Error: PERMANENT_FAILURE - 400'
                                mfa-enroll-code-rate-limited:
                                  description: |
                                    The user has exceeded the rate limit for entering an MFA code when setting up an MFA device. Note that this event is currently only generated for phone mfa types.
                                  allOf: &ref_7
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        mfa_device_type:
                                          type: string
                                          enum:
                                            - backup_code
                                            - otp
                                            - personal_key
                                            - piv_cac
                                mfa-enroll-phone-otp-sent-rate-limited:
                                  description: |
                                    The user has exceeded the rate limit for requesting OTPs be sent to their phone when setting up an MFA device.
                                  allOf: &ref_8
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        phone_number:
                                          type: string
                                          description: The provided phone number
                                mfa-enrolled:
                                  description: The user has set up multi-factor authentication
                                  allOf: &ref_9
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the MFA setup was successful.
                                        mfa_device_type:
                                          type: string
                                          enum:
                                            - backup_code
                                            - phone
                                            - piv_cac
                                            - totp
                                            - webauthn
                                            - webauthn_platform
                                        phone_number:
                                          type: string
                                          description: OPTIONAL UNLESS mfa_device_type is phone. The enrolled phone number.
                                        otp_delivery_method:
                                          type: string
                                          enum:
                                            - sms
                                            - voice
                                          description: OPTIONAL UNLESS mfa_device_type is phone. The `otp_delivery_method` is included.
                                user-registration-email-confirmed:
                                  description: |
                                    User clicks on the confirmation link sent to their provided email address. Note: Internally, Login's meaning of a 'confirmed' email is overloaded, and also requires that a password has been set. This event uses the plain-language meaning of 'confirmed': a user clicked the link in an email, showing ownership of the email account.
                                  allOf: &ref_10
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        email:
                                          type: string
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false
                                          properties:
                                            email:
                                              type: array
                                              description: An OPTIONAL key that describes errors with the email provided
                                              items:
                                                type: string
                                                enum:
                                                  - already_confirmed
                                            confirmation_token:
                                              type: array
                                              description: An OPTIONAL key that describes errors with the confirmation token
                                              items:
                                                type: string
                                                enum:
                                                  - expired
                                                  - not_found
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the user clicked on the link that was sent to them and confirmed the email they submitted is theirs.
                                user-registration-email-submission-rate-limited:
                                  description: |
                                    This event can occur during sign up when a user attempts to submit the same email address multiple times without setting up a password. Note that Login.gov does not actually prevent the user from retrying in this case.
                                  allOf: &ref_11
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        email:
                                          type: string
                                        email_already_registered:
                                          type: boolean
                                          description: |
                                            A 'true' value indicates that the user has exceeded the rate limit for submitting an email address that is already registered. A 'false' value indicates that the user has exceeded the rate limit for submitting an email address that has *not* been registered previously.
                                user-registration-email-submitted:
                                  description: A user provides their email address to create a new account.
                                  allOf: &ref_12
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        email:
                                          type: string
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false
                                          properties:
                                            email:
                                              type: array
                                              description: Errors that explain the failure
                                              items:
                                                type: string
                                                enum:
                                                  - Email address is not valid
                                                  - invalid
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the account was created successfully for the submitted email.
                                user-registration-password-submitted:
                                  description: A user provides a password for their account.
                                  allOf: &ref_13
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false
                                          properties:
                                            password:
                                              type: array
                                              description: Errors that explain the failure
                                              items:
                                                type: string
                                                enum:
                                                  - pwned
                                                  - too_short
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the entered password is valid and matches the user’s password.
                            - properties: &ref_26
                                logged-in-account-purged:
                                  description: A logged in user deletes their account.
                                  allOf: &ref_15
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the the account was successfully deleted.
                                logged-in-password-change:
                                  description: A logged in user changes the password for their account.
                                  allOf: &ref_16
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false
                                          properties:
                                            password:
                                              type: array
                                              description: Errors that explain the failure
                                              items:
                                                type: string
                                                enum:
                                                  - pwned
                                                  - too_short
                                            password_confirmation:
                                              type: array
                                              description: Errors that explain the failure
                                              items:
                                                type: string
                                                enum:
                                                  - pwned
                                                  - too_short
                                                  - mismatch
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the password was successfully changed by logged in user
                                login-completed:
                                  description: The user has logged in successfully and is being passed back to the service provider.
                                  allOf: &ref_17
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                login-email-and-password-auth:
                                  description: |
                                    During a login attempt, a user has submitted a password. Rather than tracking the number of failed password auth attempts, we generate this event on each attempt.
                                  allOf: &ref_18
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        email:
                                          type: string
                                          description: |
                                            The email address used in this login attempt.
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the entered email and password were correct.
                                login-rate-limited:
                                  description: |
                                    The user has exceeded the limit for providing their email address and password all resulting in a failed login attempt.
                                  allOf: &ref_19
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        email:
                                          type: string
                                          description: User-provided email address
                                logout-initiated:
                                  description: The user has logged out of their account.
                                  allOf: &ref_20
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the logout was successfully initiated
                                mfa-login-phone-otp-sent:
                                  description: |
                                    During a login attempt, an OTP code has been sent via SMS or Voice.
                                    Reauthentication occurs when the user was already signed in but their session has timed out and they need to reauthenticate to continue.
                                  allOf: &ref_21
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        otp_delivery_method:
                                          type: string
                                          enum:
                                            - sms
                                            - voice
                                        phone_number:
                                          type: string
                                          description: User-provided phone number
                                        reauthentication:
                                          type: boolean
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the one-time code was sent.
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false
                                          properties:
                                            telephony:
                                              type: array
                                              description: |
                                                The user registered a phone for MFA, but then opted out by replying “STOP” over text, so when attempting to send a subsequent OTP it fails with this failure reason.
                                              items:
                                                type: string
                                                enum:
                                                  - 'Telephony::OptOutError - Pinpoint Error: PERMANENT_FAILURE - 400'
                                mfa-login-phone-otp-sent-rate-limited:
                                  description: |
                                    During a login attempt, the user has exceeded the limit for requesting an OTP be sent to their phone.
                                  allOf: &ref_22
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        phone_number:
                                          type: string
                                          description: User-provided phone number
                                mfa-login-auth-submitted:
                                  description: |
                                    During a login attempt, the user has submitted a verification attempt using their MFA . 
                                    Reauthentication occurs when the user was already signed in but their session has timed out and they need to reauthenticate to continue.
                                  allOf: &ref_23
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        mfa_device_type:
                                          type: string
                                          enum:
                                            - backup_code
                                            - otp
                                            - piv_cac
                                            - totp
                                            - webauthn
                                            - webauthn_platform
                                        reauthentication:
                                          description: an OPTIONAL boolean. For use with the `otp` MFA type
                                          type: boolean
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether verification was valid.
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false.
                                          properties:
                                            piv_cac:
                                              type: array
                                              items:
                                                type: string
                                                enum:
                                                  - already_associated
                                            user:
                                              type: array
                                              items:
                                                type: string
                                                enum:
                                                  - not_found
                                                  - piv_cac_mismatch
                                            certificate:
                                              type: array
                                              items:
                                                type: string
                                                enum:
                                                  - bad
                                                  - expired
                                                  - invalid
                                                  - none
                                                  - not_auth_cert
                                                  - revoked
                                                  - unverified
                                            token:
                                              type: array
                                              items:
                                                type: string
                                                enum:
                                                  - bad
                                                  - http_failure
                                                  - invalid
                                                  - missing
                                mfa-submission-code-rate-limited:
                                  description: |
                                    The user has exceeded the limit for submitting an MFA code when signing in with a registered MFA device.
                                  allOf: &ref_24
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        mfa_device_type:
                                          type: string
                                          enum:
                                            - backup_code
                                            - otp
                                            - piv_cac
                                            - totp
                                            - webauthn
                                            - webauthn_platform
                                session-timeout:
                                  description: A logged in user has been inactive long enough to cause a session timeout
                                  allOf: &ref_25
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                            - properties: &ref_31
                                account-reset-account-deleted:
                                  description: |
                                    A user requesting an account reset has completed the process. As a result, the account was deleted successfully.
                                  allOf: &ref_27
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false
                                          properties:
                                            token:
                                              type: array
                                              description: Errors that explain the failure.
                                              items:
                                                type: string
                                                enum:
                                                  - The link to delete your Login.gov account has expired. Please create another request to delete your account.
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the account was successfully deleted.
                                forgot-password-email-confirmed:
                                  description: |
                                    A password reset having been previously requested, a user has clicked the link in the email to reset their password, confirming the email address’s validity.
                                  allOf: &ref_28
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        email:
                                          type: string
                                          description: |
                                            An OPTIONAL string. The email address of the user who clicked the password reset link in the email
                                            If the user is not found, this field will be nil
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false
                                          properties:
                                            user:
                                              type: array
                                              description: Errors that explain the failure. "blank" indicates that the token provided in the link is invalid, i.e. does not match an existing user.
                                              items:
                                                type: string
                                                enum:
                                                  - blank
                                                  - token_expired
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the link clicked on by a user is valid and not expired.
                                forgot-password-email-sent:
                                  description: |
                                    A user has requested a password reset.
                                  allOf: &ref_29
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        email:
                                          type: string
                                          description: User's email address
                                forgot-password-new-password-submitted:
                                  description: |
                                    After previously requesting a password reset and having already clicked through from the email, a user has now submitted a new password.
                                  allOf: &ref_30
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        failure_reason:
                                          type: object
                                          description: |
                                            An OPTIONAL object. An associative array of attributes and errors if success is false
                                          properties:
                                            password:
                                              type: array
                                              description: Errors that explain the failure.
                                              items:
                                                type: string
                                                enum:
                                                  - pwned
                                                  - too_short
                                            reset_password_token:
                                              type: array
                                              description: Errors that explain the failure.
                                              items:
                                                type: string
                                                enum:
                                                  - token_expired_error
                                        success:
                                          type: boolean
                                          description: |
                                            Indicates whether the new password was successfully submitted.
                            - properties: &ref_49
                                idv-address-submitted:
                                  description: |
                                    User manually submitted an IdV address
                                  allOf: &ref_32
                                    - type: object
                                      properties: *ref_0
                                    - type: object
                                      properties:
                                        address1:
                                          type: string
                                        address2:
                                          type: string
                                        city:
                                          type: string
                                        state:
                                          type: string
                                        zip:
                                          type: string
                                        address_edited:
                                          type: boolean
                                          description: |
                                            True if updated address does not match document address
                                        failure_reason:
                                          type: object
