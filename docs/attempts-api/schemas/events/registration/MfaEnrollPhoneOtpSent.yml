description: |
  Relevant only when the user is enrolling a phone as their MFA. The user has been sent a one-time password by Login.gov over SMS or voice during the MFA enrollment process.
allOf:
  - $ref: '../shared/EventProperties.yml'
  - type: object
    properties:
      phone_number:
        type: string
        description: The provided phone number
      otp_delivery_method:
        type: string
        enum:
          - sms
          - voice
      success:
        type: boolean
        description: |
          Indicates whether the one-time password was sent.
      failure_reason:
        type: object
        description: |
          An OPTIONAL object. An associative array of attributes and errors if success is false
        properties:
          telephony:
            type: array
            description: Errors that explain the failure
            items:
              type: string
              enum:
                - DailyLimitReachedError
                - DuplicateEndpointError
                - InvalidPhoneNumberError
                - InvalidCallingAreaError
                - OptOutError
                - RateLimitedError
                - SmsUnsupportedError
                - TemporaryFailureError
                - TimeoutError
                - UnknownFailureError
                - VoiceUnsupportedError
